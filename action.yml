name: Tree-sitter Grammar Setup
description: Install tree-sitter library/CLI and selected language grammars via tsdl

branding:
  color: green
  icon: package

inputs:
  # Tree-sitter library/CLI options (passed to tree-sitter/setup-action)
  install-cli:
    description: Install the tree-sitter CLI
    default: "false"
  install-lib:
    description: Install the tree-sitter library (libtree-sitter)
    default: "true"
  tree-sitter-ref:
    description: A tree-sitter commit, tag, or branch
    default: latest

  # Rust toolchain options
  setup-rust:
    description: Install Rust toolchain (required for tree_stump gem and CLI build)
    default: "false"
  rust-toolchain:
    description: Rust toolchain version (stable, nightly, or specific version)
    default: stable

  # Java/jtreesitter options (for JRuby Java backend)
  setup-java:
    description: Install Java JDK (required for jtreesitter/JRuby)
    default: "false"
  java-version:
    description: Java version to install
    default: "23"
  java-distribution:
    description: Java distribution (temurin, zulu, corretto, etc.)
    default: temurin
  setup-jtreesitter:
    description: Download jtreesitter JAR from Maven Central
    default: "false"
  jtreesitter-version:
    description: jtreesitter version to download from Maven Central
    default: "0.24.0"
  jtreesitter-install-dir:
    description: Directory to install jtreesitter JAR
    default: /usr/local/share/java

  # tsdl options
  tsdl-version:
    description: tsdl version to install (e.g. v2.0.0)
    default: v2.0.0

  # Grammar selections (all default to false - opt-in)
  grammar-bash:
    description: Install tree-sitter-bash grammar
    default: "false"
  grammar-bash-ref:
    description: tree-sitter-bash version (tag, branch, or SHA)
    default: v0.25.1
  grammar-json:
    description: Install tree-sitter-json grammar
    default: "false"
  grammar-json-ref:
    description: tree-sitter-json version (tag, branch, or SHA)
    default: v0.24.8
  grammar-toml:
    description: Install tree-sitter-toml grammar
    default: "false"
  grammar-toml-ref:
    description: tree-sitter-toml version (tag, branch, or SHA)
    default: v0.7.0
  grammar-rbs:
    description: Install tree-sitter-rbs grammar
    default: "false"
  grammar-rbs-ref:
    description: tree-sitter-rbs version (tag, branch, or SHA)
    default: v0.2.2

  # Grammar installation options
  grammar-install-prefix:
    description: Installation prefix for grammar libraries
    default: /usr/local

outputs:
  grammars-installed:
    description: Comma-separated list of installed grammar names
    value: ${{ steps.install-grammars.outputs.installed }}
  lib-path:
    description: Path to installed grammar libraries
    value: ${{ inputs.grammar-install-prefix }}/lib
  tsdl-version:
    description: Installed tsdl version
    value: ${{ inputs.tsdl-version }}
  rust-installed:
    description: Whether Rust toolchain was installed
    value: ${{ inputs.setup-rust }}
  java-installed:
    description: Whether Java JDK was installed
    value: ${{ inputs.setup-java }}
  jtreesitter-installed:
    description: Whether jtreesitter JAR was installed
    value: ${{ inputs.setup-jtreesitter }}
  jtreesitter-jar-path:
    description: Path to jtreesitter JAR file
    value: ${{ inputs.jtreesitter-install-dir }}/jtreesitter-${{ inputs.jtreesitter-version }}.jar

runs:
  using: composite
  steps:
    # Install Java JDK if requested (for jtreesitter/JRuby)
    - name: Set up Java
      if: inputs.setup-java == 'true' || inputs.setup-jtreesitter == 'true'
      uses: actions/setup-java@v4
      with:
        distribution: ${{ inputs.java-distribution }}
        java-version: ${{ inputs.java-version }}

    # Download jtreesitter JAR from Maven Central
    - name: Install jtreesitter from Maven Central
      if: inputs.setup-jtreesitter == 'true'
      shell: bash
      env:
        JTREESITTER_VERSION: ${{ inputs.jtreesitter-version }}
        INSTALL_DIR: ${{ inputs.jtreesitter-install-dir }}
      run: |
        set -euo pipefail

        echo "::group::Installing jtreesitter ${JTREESITTER_VERSION}"

        sudo mkdir -p "${INSTALL_DIR}"

        JAR_URL="https://repo1.maven.org/maven2/io/github/tree-sitter/jtreesitter/${JTREESITTER_VERSION}/jtreesitter-${JTREESITTER_VERSION}.jar"
        JAR_PATH="${INSTALL_DIR}/jtreesitter-${JTREESITTER_VERSION}.jar"

        echo "Downloading from: ${JAR_URL}"
        if ! sudo curl -fsSL "${JAR_URL}" -o "${JAR_PATH}"; then
          echo "::error::Failed to download jtreesitter from Maven Central"
          exit 1
        fi

        echo "Installed to: ${JAR_PATH}"
        ls -la "${JAR_PATH}"

        echo "::endgroup::"
        echo "✅ jtreesitter ${JTREESITTER_VERSION} installed successfully"

    # Configure Java environment variables for jtreesitter
    - name: Configure jtreesitter paths
      if: inputs.setup-jtreesitter == 'true'
      shell: bash
      env:
        JTREESITTER_VERSION: ${{ inputs.jtreesitter-version }}
        INSTALL_DIR: ${{ inputs.jtreesitter-install-dir }}
      run: |
        JAR_PATH="${INSTALL_DIR}/jtreesitter-${JTREESITTER_VERSION}.jar"

        echo "TREE_SITTER_JAVA_JARS_DIR=${INSTALL_DIR}" >> "$GITHUB_ENV"

        if [[ ":$CLASSPATH:" != *":${JAR_PATH}:"* ]]; then
          echo "CLASSPATH=${JAR_PATH}${CLASSPATH:+:$CLASSPATH}" >> "$GITHUB_ENV"
        fi

        echo "jtreesitter environment configured"

    # Install Rust toolchain if requested (for tree_stump gem or CLI build)
    - name: Install Rust toolchain
      if: inputs.setup-rust == 'true'
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-toolchain }}

    # Use official tree-sitter/setup-action for library and CLI
    - name: Install tree-sitter library and CLI
      uses: tree-sitter/setup-action@v2
      with:
        install-cli: ${{ inputs.install-cli }}
        install-lib: ${{ inputs.install-lib }}
        tree-sitter-ref: ${{ inputs.tree-sitter-ref }}
        rust-toolchain: ${{ inputs.rust-toolchain }}

    # Install tsdl binary
    - name: Install tsdl
      id: install-tsdl
      shell: bash
      env:
        TSDL_VERSION: ${{ inputs.tsdl-version }}
      run: |
        set -euo pipefail

        echo "::group::Installing tsdl ${TSDL_VERSION}"

        arch="$(uname -m)"
        case "$arch" in
          x86_64)  arch="x64" ;;
          aarch64) arch="arm64" ;;
          armv7l)  arch="arm" ;;
          i686)    arch="x86" ;;
          *) echo "::error::Unsupported architecture: $arch"; exit 1 ;;
        esac

        os="$(uname -s | tr '[:upper:]' '[:lower:]')"
        case "$os" in
          linux)  os="linux" ;;
          darwin) os="macos" ;;
          *) echo "::error::Unsupported OS: $os"; exit 1 ;;
        esac

        url="https://github.com/stackmystack/tsdl/releases/download/${TSDL_VERSION}/tsdl-${os}-${arch}.gz"
        echo "Downloading from: ${url}"

        tmpbin=$(mktemp /tmp/tsdl-XXXX)
        if ! curl -fsSL "${url}" -o "${tmpbin}.gz"; then
          echo "::error::Failed to download tsdl from ${url}"
          exit 1
        fi
        gunzip -f "${tmpbin}.gz"
        chmod +x "$tmpbin"
        sudo mv "$tmpbin" /usr/local/bin/tsdl

        echo "Installed: $(tsdl --version)"
        echo "::endgroup::"

    # Build and install selected grammars via tsdl
    - name: Install selected grammars
      id: install-grammars
      shell: bash
      env:
        INSTALL_PREFIX: ${{ inputs.grammar-install-prefix }}
        GRAMMAR_BASH: ${{ inputs.grammar-bash }}
        GRAMMAR_BASH_REF: ${{ inputs.grammar-bash-ref }}
        GRAMMAR_JSON: ${{ inputs.grammar-json }}
        GRAMMAR_JSON_REF: ${{ inputs.grammar-json-ref }}
        GRAMMAR_TOML: ${{ inputs.grammar-toml }}
        GRAMMAR_TOML_REF: ${{ inputs.grammar-toml-ref }}
        GRAMMAR_RBS: ${{ inputs.grammar-rbs }}
        GRAMMAR_RBS_REF: ${{ inputs.grammar-rbs-ref }}
      run: |
        set -euo pipefail

        # Build list of requested grammars
        GRAMMARS=()
        [[ "$GRAMMAR_BASH" == "true" ]] && GRAMMARS+=("bash")
        [[ "$GRAMMAR_JSON" == "true" ]] && GRAMMARS+=("json")
        [[ "$GRAMMAR_TOML" == "true" ]] && GRAMMARS+=("toml")
        [[ "$GRAMMAR_RBS" == "true" ]] && GRAMMARS+=("rbs")

        if [[ ${#GRAMMARS[@]} -eq 0 ]]; then
          echo "No grammars selected for installation"
          echo "installed=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "Grammars to install: ${GRAMMARS[*]}"

        # Generate parsers.toml for tsdl
        WORKDIR=$(mktemp -d)
        trap "rm -rf $WORKDIR" EXIT
        CONFIG="${WORKDIR}/parsers.toml"

        {
          echo "out-dir = \"${INSTALL_PREFIX}/lib\""
          echo ""
          echo "[parsers]"
        } > "$CONFIG"

        # Append each selected grammar with its ref and source
        if [[ "$GRAMMAR_BASH" == "true" ]]; then
          echo "bash = \"${GRAMMAR_BASH_REF}\"" >> "$CONFIG"
        fi
        if [[ "$GRAMMAR_JSON" == "true" ]]; then
          echo "json = \"${GRAMMAR_JSON_REF}\"" >> "$CONFIG"
        fi
        if [[ "$GRAMMAR_TOML" == "true" ]]; then
          echo "toml = { ref = \"${GRAMMAR_TOML_REF}\", from = \"https://github.com/tree-sitter-grammars/tree-sitter-toml\" }" >> "$CONFIG"
        fi
        if [[ "$GRAMMAR_RBS" == "true" ]]; then
          echo "rbs = { ref = \"${GRAMMAR_RBS_REF}\", from = \"https://github.com/joker1007/tree-sitter-rbs\" }" >> "$CONFIG"
        fi

        echo "::group::Generated parsers.toml"
        cat "$CONFIG"
        echo "::endgroup::"

        # Build grammars with tsdl
        echo "::group::Building grammars with tsdl"
        cd "$WORKDIR"
        sudo tsdl build --progress plain
        echo "::endgroup::"

        # Update ldconfig
        sudo ldconfig

        # Set outputs
        INSTALLED_STR=$(IFS=','; echo "${GRAMMARS[*]}")
        echo "installed=${INSTALLED_STR}" >> "$GITHUB_OUTPUT"
        echo "✅ Successfully installed grammars: ${INSTALLED_STR}"

    # Set up environment variables for installed grammars
    - name: Configure grammar paths
      if: steps.install-grammars.outputs.installed != ''
      shell: bash
      env:
        INSTALL_PREFIX: ${{ inputs.grammar-install-prefix }}
        GRAMMAR_BASH: ${{ inputs.grammar-bash }}
        GRAMMAR_JSON: ${{ inputs.grammar-json }}
        GRAMMAR_TOML: ${{ inputs.grammar-toml }}
        GRAMMAR_RBS: ${{ inputs.grammar-rbs }}
      run: |
        set -euo pipefail

        LIB_PATH="${INSTALL_PREFIX}/lib"

        echo "::group::Configuring grammar environment variables"

        # Add to LD_LIBRARY_PATH if not already present
        if [[ ":${LD_LIBRARY_PATH:-}:" != *":${LIB_PATH}:"* ]]; then
          echo "LD_LIBRARY_PATH=${LIB_PATH}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "  ✓ LD_LIBRARY_PATH includes ${LIB_PATH}"
        fi

        # Set individual grammar path environment variables
        for grammar in bash json toml rbs; do
          var_name="GRAMMAR_${grammar^^}"
          if [[ "${!var_name}" == "true" ]]; then
            env_name="TREE_SITTER_${grammar^^}_PATH"
            so_path="${LIB_PATH}/libtree-sitter-${grammar}.so"
            echo "${env_name}=${so_path}" >> "$GITHUB_ENV"
            echo "  ✓ ${env_name}=${so_path}"
          fi
        done

        echo "::endgroup::"
        echo "✅ Grammar paths configured"

    # Verify grammar environment in a fresh shell
    - name: Verify grammar environment
      if: steps.install-grammars.outputs.installed != ''
      shell: bash
      env:
        INSTALL_PREFIX: ${{ inputs.grammar-install-prefix }}
      run: |
        set -euo pipefail

        echo "::group::Verifying grammar environment"

        LIB_PATH="${INSTALL_PREFIX}/lib"
        ERRORS=0

        for so_file in "${LIB_PATH}"/libtree-sitter-*.so; do
          if [[ -f "$so_file" ]]; then
            grammar_name=$(basename "$so_file" .so | sed 's/^libtree-sitter-//')
            env_var="TREE_SITTER_${grammar_name^^}_PATH"

            echo "  ✓ Found: $so_file"

            if [[ -n "${!env_var:-}" ]]; then
              echo "    ✓ ${env_var} is set"
            else
              echo "    ✗ ${env_var} is not set"
              ERRORS=$((ERRORS + 1))
            fi

            if command -v nm >/dev/null 2>&1; then
              symbol="tree_sitter_${grammar_name}"
              if nm -D "$so_file" 2>/dev/null | grep -q "$symbol"; then
                echo "    ✓ Symbol ${symbol} exported"
              else
                echo "    ✗ Symbol ${symbol} not found"
                ERRORS=$((ERRORS + 1))
              fi
            fi
          fi
        done

        if [[ $ERRORS -eq 0 ]]; then
          echo "::endgroup::"
          echo "✅ All grammars verified"
        else
          echo "::endgroup::"
          echo "::warning::${ERRORS} grammar verification issues found"
        fi

